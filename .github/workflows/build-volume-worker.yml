name: Build and Push Volume Worker Image

# This workflow builds and pushes Docker images for the volume worker component.
# For main branch builds, it runs via workflow_run trigger after CI/CD Pipeline
# completes to ensure semantic-release has created the new version tag.

on:
  push:
    branches:
      - development
      - "release/**"
      - "hotfix/**"
    paths:
      - "workers/volume-worker/**"
      - ".github/workflows/build-volume-worker.yml"
  pull_request:
    branches: [main]
    paths:
      - "workers/volume-worker/**"
  workflow_dispatch:
    # Allow manual triggering
  workflow_run:
    workflows: ["CI/CD Pipeline"]
    types: [completed]
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: volume-worker

jobs:
  build-and-push:
    name: Build and Push Volume Worker
    runs-on: ubuntu-latest
    # Only run on main if CI/CD Pipeline completed successfully
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Need full history for version detection

      - name: Get app version for tagging
        id: version
        run: |
          set -e

          # Get the latest semantic version tag
          LATEST_TAG=$(git describe --tags --match "v*" --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "latest_tag=${LATEST_TAG}" >> $GITHUB_OUTPUT

          BRANCH="${{ github.ref_name }}"
          echo "Analyzing branch: ${BRANCH}"

          # Determine version and suffix based on branch type
          case "${BRANCH}" in
            release/*)
              # Extract version from release branch: release/v1.2.3 -> v1.2.3
              RELEASE_VERSION=$(echo "${BRANCH}" | sed -n 's/release\/v\?\([0-9]\+\.[0-9]\+\.[0-9]\+\).*/v\1/p')
              if [[ -n "${RELEASE_VERSION}" ]]; then
                echo "version=${RELEASE_VERSION}" >> $GITHUB_OUTPUT
                echo "suffix=" >> $GITHUB_OUTPUT
                echo "📦 Release version: ${RELEASE_VERSION}"
              else
                echo "❌ Invalid release branch format: ${BRANCH}"
                exit 1
              fi
              ;;
            hotfix/*)
              # Extract base version from hotfix branch: hotfix/v1.2.3-fix -> v1.2.3-hotfix
              HOTFIX_VERSION=$(echo "${BRANCH}" | sed -n 's/hotfix\/v\?\([0-9]\+\.[0-9]\+\.[0-9]\+\).*/v\1/p')
              if [[ -n "${HOTFIX_VERSION}" ]]; then
                echo "version=${HOTFIX_VERSION}" >> $GITHUB_OUTPUT
                echo "suffix=hotfix" >> $GITHUB_OUTPUT
                echo "🔧 Hotfix version: ${HOTFIX_VERSION}-hotfix"
              else
                echo "❌ Invalid hotfix branch format: ${BRANCH}"
                exit 1
              fi
              ;;
            main)
              # Main builds are triggered via workflow_run after CI/CD Pipeline completes
              # This ensures semantic-release has already created the new tag
              echo "version=${LATEST_TAG}" >> $GITHUB_OUTPUT
              echo "suffix=latest" >> $GITHUB_OUTPUT
              echo "🚀 Main version: ${LATEST_TAG}-latest"
              ;;
            development)
              # Development uses next patch version with -beta suffix
              if [[ "${LATEST_TAG}" == "v0.0.0" ]]; then
                NEXT_VERSION="v0.1.0"
              else
                # Increment patch version: v1.2.3 -> v1.2.4
                NEXT_VERSION=$(echo "${LATEST_TAG}" | awk -F. '{printf "v%d.%d.%d", $1, $2, $3+1}' | sed 's/v/v/')
              fi
              echo "version=${NEXT_VERSION}" >> $GITHUB_OUTPUT
              echo "suffix=beta" >> $GITHUB_OUTPUT
              echo "🧪 Development version: ${NEXT_VERSION}-beta"
              ;;
            *)
              echo "❌ Unsupported branch: ${BRANCH}"
              echo "Only main, development, release/*, and hotfix/* branches are allowed"
              exit 1
              ;;
          esac

          echo "📊 Final version info:"
          echo "  Branch: ${BRANCH}"
          echo "  Latest tag: ${LATEST_TAG}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker tags
        id: tags
        run: |
          set -e

          REGISTRY="${{ env.REGISTRY }}"
          REPO="${{ github.repository }}"
          # Convert repository name to lowercase for Docker compatibility
          REPO_LOWER=$(echo "${REPO}" | tr '[:upper:]' '[:lower:]')
          # Extract just the owner for cleaner package naming
          REPO_OWNER=$(echo "${REPO_LOWER}" | cut -d'/' -f1)
          IMAGE="${REGISTRY}/${REPO_OWNER}/volume-worker"

          VERSION="${{ steps.version.outputs.version }}"
          SUFFIX="${{ steps.version.outputs.suffix }}"
          BRANCH="${{ github.ref_name }}"
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"

          echo "🏷️  Generating tags for:"
          echo "  Repository: ${REPO} → ${REPO_OWNER}/volume-worker"
          echo "  Version: ${VERSION}"
          echo "  Suffix: ${SUFFIX}"
          echo "  Branch: ${BRANCH}"

          # Build tag list
          TAGS=""

          case "${BRANCH}" in
            release/*)
              # Release: v1.2.3, release-v1.2.3, release-v1.2.3-abc123
              TAGS="${IMAGE}:${VERSION}"
              TAGS="${TAGS},${IMAGE}:release-${VERSION}"
              TAGS="${TAGS},${IMAGE}:release-${VERSION}-${SHORT_SHA}"
              ;;
            hotfix/*)
              # Hotfix: v1.2.3-hotfix, hotfix-v1.2.3, hotfix-v1.2.3-abc123
              TAGS="${IMAGE}:${VERSION}-${SUFFIX}"
              TAGS="${TAGS},${IMAGE}:hotfix-${VERSION}"
              TAGS="${TAGS},${IMAGE}:hotfix-${VERSION}-${SHORT_SHA}"
              ;;
            main)
              # Main: v1.2.3-latest, latest (clean, no SHA clutter)
              TAGS="${IMAGE}:${VERSION}-${SUFFIX}"
              TAGS="${TAGS},${IMAGE}:${SUFFIX}"
              ;;
            development)
              # Development: v1.2.4-beta, beta (clean, no SHA clutter)
              TAGS="${IMAGE}:${VERSION}-${SUFFIX}"
              TAGS="${TAGS},${IMAGE}:${SUFFIX}"
              ;;
          esac

          echo "tags=${TAGS}" >> $GITHUB_OUTPUT

          echo "📦 Generated tags:"
          echo "${TAGS}" | tr ',' '\n' | sed 's/^/  - /'

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./workers/volume-worker
          file: ./workers/volume-worker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image details
        run: |
          echo "🚀 Volume Worker image built and pushed successfully!"
          echo "📦 Image tags:"
          echo "${{ steps.tags.outputs.tags }}" | tr ',' '\n' | sed 's/^/  - /'
          echo ""
          # Convert repository owner to lowercase for URL
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_OWNER_LOWER=$(echo "${REPO_OWNER}" | tr '[:upper:]' '[:lower:]')
          echo "🔗 Registry URL: https://github.com/${REPO_OWNER_LOWER}/media-labs/pkgs/container/${{ env.IMAGE_NAME }}"

  test-image:
    name: Test Volume Worker Image
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name != 'push' || github.ref != 'refs/heads/main'

    steps:
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Test volume worker image
        run: |
          # Determine the image tag based on branch type
          BRANCH="${{ github.ref_name }}"

          # Convert repository to lowercase for Docker compatibility
          REPO="${{ github.repository }}"
          REPO_LOWER=$(echo "${REPO}" | tr '[:upper:]' '[:lower:]')
          # Extract just the owner for cleaner package naming
          REPO_OWNER=$(echo "${REPO_LOWER}" | cut -d'/' -f1)
          BASE_IMAGE="${{ env.REGISTRY }}/${REPO_OWNER}/${{ env.IMAGE_NAME }}"

          # Use appropriate tag based on branch type
          case "${BRANCH}" in
            release/*)
              # Use the version tag for release branches
              VERSION=$(echo "${BRANCH}" | sed -n 's/release\/v\?\([0-9]\+\.[0-9]\+\.[0-9]\+\).*/v\1/p')
              IMAGE_TAG="${BASE_IMAGE}:${VERSION}"
              ;;
            hotfix/*)
              # Use the hotfix tag for hotfix branches
              VERSION=$(echo "${BRANCH}" | sed -n 's/hotfix\/v\?\([0-9]\+\.[0-9]\+\.[0-9]\+\).*/v\1/p')
              IMAGE_TAG="${BASE_IMAGE}:${VERSION}-hotfix"
              ;;
            main)
              # Use the generic latest tag for main
              IMAGE_TAG="${BASE_IMAGE}:latest"
              ;;
            development)
              # Use the generic beta tag for development
              IMAGE_TAG="${BASE_IMAGE}:beta"
              ;;
            *)
              echo "❌ Unsupported branch for testing: ${BRANCH}"
              exit 1
              ;;
          esac

          echo "🧪 Testing volume worker image: ${IMAGE_TAG}"

          # Run a quick validation test - just check if the image has the handler
          echo "📋 Running basic image validation..."
          timeout 5s docker run --rm "${IMAGE_TAG}" python -c "import handler; print('✅ Handler module OK')" || {
            echo "⚠️  Handler validation failed or timed out"
            echo "📝 This may be expected for some configurations"
          }

          # Verify the image exists and can start
          echo "� Verifying image can start..."
          timeout 3s docker run --rm "${IMAGE_TAG}" echo "✅ Volume worker image validation completed" || {
            echo "⚠️  Image startup test failed"
          }

          echo "✅ Volume worker image test completed!"

  cleanup:
    name: Cleanup Old Tagged Images
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/development'

    steps:
      - name: Delete old suffixed versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: ${{ env.IMAGE_NAME }}
          package-type: container
          min-versions-to-keep: 3
          delete-only-untagged-versions: false
        continue-on-error: true

      - name: Clean old development and latest tagged versions
        run: |
          echo "🧹 Cleaning up old tagged versions..."
          echo "This ensures only the latest -latest and -beta versions remain"
          echo "Generic tags (latest, beta) are automatically overwritten"

          # Note: The delete-package-versions action above handles the cleanup
          # We keep the 3 most recent versions to maintain some history
          # while preventing accumulation of old -latest and -beta tags
