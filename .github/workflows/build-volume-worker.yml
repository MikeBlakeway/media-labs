name: Build and Push Volume Worker Image

on:
  push:
    branches: [main, development]
    paths: 
      - 'volume-worker/**'
      - '.github/workflows/build-volume-worker.yml'
  pull_request:
    branches: [main]
    paths:
      - 'volume-worker/**'
  workflow_dispatch:
    # Allow manual triggering

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: volume-worker

jobs:
  build-and-push:
    name: Build and Push Volume Worker
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./volume-worker
          file: ./volume-worker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image details
        run: |
          echo "🚀 Volume Worker image built and pushed successfully!"
          echo "📦 Image tags:"
          echo "${{ steps.meta.outputs.tags }}" | tr ',' '\n' | sed 's/^/  - /'
          echo ""
          echo "🔗 Registry URL: https://github.com/${{ github.repository_owner }}/media-labs/pkgs/container/${{ env.IMAGE_NAME }}"

  test-image:
    name: Test Volume Worker Image
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name != 'push' || github.ref != 'refs/heads/main'

    steps:
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Test volume worker image
        run: |
          # Get the image tag from the build job
          IMAGE_TAG="${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-${{ github.sha }}"
          
          echo "🧪 Testing volume worker image: ${IMAGE_TAG}"
          
          # Run image in test mode
          docker run --rm \
            -e LOCAL_MODE=true \
            -e HF_HOME=/tmp/hf_cache \
            -e ALLOW_DELETE=false \
            --timeout 30s \
            "${IMAGE_TAG}" \
            python handler.py --test
          
          echo "✅ Volume worker image test completed successfully!"

  cleanup:
    name: Cleanup Old Images
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Delete old container images
        uses: actions/delete-package-versions@v5
        with:
          package-name: ${{ env.IMAGE_NAME }}
          package-type: container
          min-versions-to-keep: 5
          delete-only-untagged-versions: true