name: CD Pipeline

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: docker.io
  IMAGE_NAME: media-lab

jobs:
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
      frontend_uploaded: ${{ steps.check-frontend.outputs.frontend_uploaded }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install root dependencies
        run: npm ci

      - name: Build frontend
        run: |
          if [ -d "apps/web" ]; then
            npm run -w apps/web build
          else
            echo "No frontend found, skipping build"
          fi

      - name: Cache frontend build (.next)
        uses: actions/cache@v4
        with:
          path: apps/web/.next
          key: ${{ runner.os }}-next-${{ hashFiles('apps/web/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-next-

      - name: Verify frontend upload contents (diagnostic)
        run: |
          echo "Listing apps/web and .next for diagnostics"
          ls -la apps/web || true
          if [ -d "apps/web/.next" ] && [ "$(ls -A apps/web/.next)" ]; then
            echo ".next exists and is not empty"
            du -sh apps/web/.next || true
            ls -la apps/web/.next | head -n 200
          else
            echo "ERROR: apps/web/.next is missing or empty; build may have failed or produced output elsewhere"
            exit 1
          fi

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: apps/web/.next
          include-hidden-files: true

      - name: Check frontend upload
        id: check-frontend
        run: |
          if [ -d "apps/web/.next" ]; then
            echo "frontend_uploaded=true" >> $GITHUB_OUTPUT
          else
            echo "frontend_uploaded=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx (inline)
        run: |
          echo "Checking for docker buildx..."
          if docker buildx version >/dev/null 2>&1; then
            echo "docker buildx is already available"
          else
            echo "Installing docker buildx plugin"
            mkdir -p ~/.docker/cli-plugins
            curl -fsSL "https://github.com/docker/buildx/releases/latest/download/buildx-$(uname -s)-$(uname -m)" -o ~/.docker/cli-plugins/docker-buildx
            chmod +x ~/.docker/cli-plugins/docker-buildx
          fi
          docker buildx create --use || true

      - name: Log in to Docker Hub (CLI)
        run: |
          echo "Logging in to Docker registry ${REGISTRY}"
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login ${{ env.REGISTRY }} -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Extract metadata (inline)
        id: meta
        run: |
          echo "Generating simple docker tags"
          REF_NAME="${GITHUB_REF_NAME:-${GITHUB_REF##*/}}"
          SHORT_SHA="${GITHUB_SHA::7}"
          IMAGE_BASE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          TAGS="${IMAGE_BASE}:${REF_NAME},${IMAGE_BASE}:${SHORT_SHA}"
          echo "tags=$TAGS" >> $GITHUB_OUTPUT
          echo "labels=" >> $GITHUB_OUTPUT

      - name: Build and push Docker image (inline)
        id: build
        run: |
          echo "Building and pushing docker images from ./infra/docker/Dockerfile"
          IFS=',' read -ra TAG_ARR <<< "${{ steps.meta.outputs.tags }}"
          for TAG in "${TAG_ARR[@]}"; do
            echo "Building image $TAG"
            docker build --file ./infra/docker/Dockerfile --tag "$TAG" .
            echo "Pushing image $TAG"
            docker push "$TAG"
          done

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-images
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    environment:
      name: staging
      url: https://staging.media-lab.example.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend build artifact
        if: needs.build-images.outputs.frontend_uploaded == 'true'
        uses: actions/download-artifact@v4
        with:
          # Intentionally omit `run-id` so the artifact is downloaded from the same workflow run (needs.build-images)
          name: frontend-build
          path: apps/web/.next

      - name: Restore frontend build cache (.next)
        uses: actions/cache@v4
        with:
          path: apps/web/.next
          key: ${{ runner.os }}-next-${{ hashFiles('apps/web/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-next-

      - name: Deploy to staging
        run: |
          echo "Deploying ${{ needs.build-images.outputs.image-tag }} to staging"
          # Add your staging deployment commands here
          # Example: kubectl, docker-compose, or API calls to your hosting platform

      - name: Run smoke tests
        run: |
          echo "Running smoke tests against staging environment"
          # Add smoke tests here
          # Example: curl health checks, basic API tests

      - name: Update deployment status
        if: always()
        run: |
          echo "Staging deployment completed"
          # Add notification logic here (Slack, email, etc.)

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-images, deploy-staging]
    if: (startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production'))
    environment:
      name: production
      url: https://media-lab.example.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend build artifact
        if: needs.build-images.outputs.frontend_uploaded == 'true'
        uses: actions/download-artifact@v4
        with:
          # Intentionally omit `run-id` so the artifact is downloaded from the same workflow run (needs.build-images)
          name: frontend-build
          path: apps/web/.next

      - name: Restore frontend build cache (.next)
        uses: actions/cache@v4
        with:
          path: apps/web/.next
          key: ${{ runner.os }}-next-${{ hashFiles('apps/web/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-next-

      - name: Deploy to production
        run: |
          echo "Deploying ${{ needs.build-images.outputs.image-tag }} to production"
          # Add your production deployment commands here

      - name: Run smoke tests
        run: |
          echo "Running smoke tests against production environment"
          # Add production smoke tests here

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          body: |
            Automated release for ${{ github.ref_name }}

            Docker Image: ${{ needs.build-images.outputs.image-tag }}
            Commit: ${{ github.sha }}
          draft: false
          prerelease: false
      - name: Update deployment status
        if: always()
        run: |
          echo "Production deployment completed"
          # Add notification logic here

  rollback:
    name: Rollback Deployment
    runs-on: ubuntu-latest
    if: failure() && (needs.deploy-staging.result == 'failure' || needs.deploy-production.result == 'failure')
    needs: [deploy-staging, deploy-production]
    environment:
      name: ${{ github.event.inputs.environment || 'staging' }}

    steps:
      - name: Rollback deployment
        run: |
          echo "Rolling back failed deployment"
          # Add rollback logic here
          # Example: deploy previous known good version

      - name: Notify team
        run: |
          echo "Deployment rollback completed"
          # Add notification logic here
