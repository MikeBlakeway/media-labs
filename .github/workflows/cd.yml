name: CD Pipeline

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: docker.io
  IMAGE_NAME: media-lab

jobs:
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install root dependencies
        run: npm ci

      - name: Build frontend
        run: |
          if [ -d "apps/web" ]; then
            npm run -w apps/web build
          else
            echo "No frontend found, skipping build"
          fi

      - name: Cache frontend build (.next)
        uses: actions/cache@v4
        with:
          path: apps/web/.next
          key: ${{ runner.os }}-next-${{ hashFiles('apps/web/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-next-

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: apps/web/.next

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix={{branch}}-

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./infra/docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-images
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    environment:
      name: staging
      url: https://staging.media-lab.example.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: apps/web/.next

      - name: Restore frontend build cache (.next)
        uses: actions/cache@v4
        with:
          path: apps/web/.next
          key: ${{ runner.os }}-next-${{ hashFiles('apps/web/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-next-

      - name: Deploy to staging
        run: |
          echo "Deploying ${{ needs.build-images.outputs.image-tag }} to staging"
          # Add your staging deployment commands here
          # Example: kubectl, docker-compose, or API calls to your hosting platform

      - name: Run smoke tests
        run: |
          echo "Running smoke tests against staging environment"
          # Add smoke tests here
          # Example: curl health checks, basic API tests

      - name: Update deployment status
        if: always()
        run: |
          echo "Staging deployment completed"
          # Add notification logic here (Slack, email, etc.)

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-images, deploy-staging]
    if: (startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production'))
    environment:
      name: production
      url: https://media-lab.example.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: apps/web/.next

      - name: Restore frontend build cache (.next)
        uses: actions/cache@v4
        with:
          path: apps/web/.next
          key: ${{ runner.os }}-next-${{ hashFiles('apps/web/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-next-

      - name: Deploy to production
        run: |
          echo "Deploying ${{ needs.build-images.outputs.image-tag }} to production"
          # Add your production deployment commands here

      - name: Run smoke tests
        run: |
          echo "Running smoke tests against production environment"
          # Add production smoke tests here

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          body: |
            Automated release for ${{ github.ref_name }}

            Docker Image: ${{ needs.build-images.outputs.image-tag }}
            Commit: ${{ github.sha }}
          draft: false
          prerelease: false
      - name: Update deployment status
        if: always()
        run: |
          echo "Production deployment completed"
          # Add notification logic here

  rollback:
    name: Rollback Deployment
    runs-on: ubuntu-latest
    if: failure() && (needs.deploy-staging.result == 'failure' || needs.deploy-production.result == 'failure')
    needs: [deploy-staging, deploy-production]
    environment:
      name: ${{ github.event.inputs.environment || 'staging' }}

    steps:
      - name: Rollback deployment
        run: |
          echo "Rolling back failed deployment"
          # Add rollback logic here
          # Example: deploy previous known good version

      - name: Notify team
        run: |
          echo "Deployment rollback completed"
          # Add notification logic here
