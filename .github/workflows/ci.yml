name: CI

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

concurrency:
  group: ci-${{ github.sha }}
  cancel-in-progress: true

jobs:
  build:
    name: CI (lint · test · build)
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Enable Corepack
        run: corepack enable || true

      - name: Prepare pinned pnpm
        run: corepack prepare pnpm@10.15.0 --activate

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store/v3
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Cache Turborepo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ hashFiles('**/package.json', '**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client (if present)
        run: |
          if [ -f ./apps/api/package.json ]; then
            pnpm --filter ./apps/api run prisma:generate || true
          else
            echo "no apps/api package.json found — skipping prisma:generate"
          fi

      - name: Lint (workspace)
        run: pnpm run lint

      - name: Run tests (workspace)
        run: pnpm run test

      - name: Build (workspace)
        run: pnpm run build

      - name: Save Turborepo cache
        if: always()
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ hashFiles('**/package.json', '**/pnpm-lock.yaml') }}
