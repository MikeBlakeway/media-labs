name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: 20
  PYTHON_VERSION: 3.12
  NEXT_TELEMETRY_DISABLED: '1'

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install root dependencies
        run: npm ci

      - name: Lint TypeScript/JavaScript
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Python dependencies
        working-directory: services/api
        run: |
          pip install -r requirements.txt
          pip install ruff mypy

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('services/api/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Lint Python with ruff
        working-directory: services/api
        run: |
          if find . -name "*.py" | grep -q .; then
            ruff check .
          else
            echo "No Python files found, skipping ruff check..."
          fi

      - name: Format check Python with ruff
        working-directory: services/api
        run: |
          if find . -name "*.py" | grep -q .; then
            ruff format --check .
          else
            echo "No Python files found, skipping ruff format check..."
          fi

  type-check:
    name: Type Checking
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install root dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run typecheck

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Python dependencies
        working-directory: services/api
        run: |
          pip install -r requirements.txt
          pip install mypy

      - name: Python type check with mypy
        working-directory: services/api
        run: |
          if find . -name "*.py" | grep -q .; then
            mypy . --ignore-missing-imports
          else
            echo "No Python files found, skipping mypy type check..."
          fi

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install root dependencies
        run: npm ci

      - name: Download frontend build artifact
        if: needs.build.outputs.frontend_built == 'true'
        uses: actions/download-artifact@v4
        with:
          # Intentionally omit `run-id` so the artifact is downloaded from the current workflow run
          name: frontend-build
          path: apps/web/.next

      - name: Cache frontend build (.next)
        uses: actions/cache@v4
        with:
          path: apps/web/.next
          key: ${{ runner.os }}-next-${{ hashFiles('apps/web/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-next-

      - name: Cache root node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-root-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-root-node-

      - name: Run frontend tests
        working-directory: apps/web
        run: |
          if [ -f "jest.config.js" ] || [ -f "jest.config.ts" ] || grep -q '"test"' package.json; then
            npm test
          else
            echo "No tests configured for frontend, skipping..."
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Python dependencies
        working-directory: services/api
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run API tests
        working-directory: services/api
        run: |
          if [ -d "tests" ] || [ -f "test_*.py" ] || find . -name "*_test.py" | grep -q .; then
            pytest
          else
            echo "No tests found for API, skipping..."
          fi

  build:
    name: Build Applications
    runs-on: ubuntu-latest
    needs: [lint, type-check]
    outputs:
      frontend_built: ${{ steps.check-frontend.outputs.frontend_built }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install root dependencies
        run: npm ci

      - name: Cache root node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-root-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-root-node-

      - name: Build Next.js application
        run: npm run -w apps/web build

      - name: Cache frontend build (.next)
        uses: actions/cache@v4
        with:
          path: apps/web/.next
          key: ${{ runner.os }}-next-${{ hashFiles('apps/web/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-next-

      - name: Verify frontend upload contents (diagnostic)
        run: |
          echo "Listing apps/web and .next for diagnostics"
          ls -la apps/web || true
          if [ -d "apps/web/.next" ] && [ "$(ls -A apps/web/.next)" ]; then
            echo ".next exists and is not empty"
            du -sh apps/web/.next || true
            ls -la apps/web/.next | head -n 200
          else
            echo "ERROR: apps/web/.next is missing or empty; build may have failed or produced output elsewhere"
            exit 1
          fi

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: apps/web/.next
          include-hidden-files: true

      - name: Check frontend build artifact
        id: check-frontend
        run: |
          if [ -d "apps/web/.next" ]; then
            echo "frontend_built=true" >> $GITHUB_OUTPUT
          else
            echo "frontend_built=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx (inline)
        run: |
          echo "Checking for docker buildx..."
          if docker buildx version >/dev/null 2>&1; then
            echo "docker buildx is already available"
          else
            echo "Installing docker buildx plugin"
            mkdir -p ~/.docker/cli-plugins
            curl -fsSL "https://github.com/docker/buildx/releases/latest/download/buildx-$(uname -s)-$(uname -m)" -o ~/.docker/cli-plugins/docker-buildx
            chmod +x ~/.docker/cli-plugins/docker-buildx
          fi
          docker buildx create --use || true

      - name: Build Docker images
        run: |
          if [ -f "infra/docker/Dockerfile" ] || [ -f "Dockerfile" ]; then
            docker build -t media-lab:latest .
            echo "Docker image built successfully"
          else
            echo "No Dockerfile found, skipping Docker build..."
          fi

  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level moderate

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Python dependencies
        working-directory: services/api
        run: |
          pip install -r requirements.txt
          pip install pip-audit

      - name: Run Python security audit
        working-directory: services/api
        run: pip-audit -r requirements.txt
