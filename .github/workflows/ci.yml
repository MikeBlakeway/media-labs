name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: 20
  PYTHON_VERSION: 3.12

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install root dependencies
        run: npm ci

      - name: Install web dependencies
        working-directory: apps/web
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm i; fi

      - name: Lint TypeScript/JavaScript
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install Python dependencies
        working-directory: services/api
        run: |
          pip install -r requirements.txt
          pip install ruff mypy

      - name: Lint Python with ruff
        working-directory: services/api
        run: ruff check .

      - name: Format check Python with ruff
        working-directory: services/api
        run: ruff format --check .

  type-check:
    name: Type Checking
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install root dependencies
        run: npm ci

      - name: Install web dependencies
        working-directory: apps/web
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm i; fi

      - name: TypeScript type check
        run: npm run typecheck

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install Python dependencies
        working-directory: services/api
        run: |
          pip install -r requirements.txt
          pip install mypy

      - name: Python type check with mypy
        working-directory: services/api
        run: mypy . --ignore-missing-imports

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install root dependencies
        run: npm ci

      - name: Install web dependencies
        working-directory: apps/web
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm i; fi

      - name: Run frontend tests
        working-directory: apps/web
        run: |
          if [ -f "jest.config.js" ] || [ -f "jest.config.ts" ] || grep -q '"test"' package.json; then
            npm test
          else
            echo "No tests configured for frontend, skipping..."
          fi

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install Python dependencies
        working-directory: services/api
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run API tests
        working-directory: services/api
        run: |
          if [ -d "tests" ] || [ -f "test_*.py" ] || find . -name "*_test.py" | grep -q .; then
            pytest
          else
            echo "No tests found for API, skipping..."
          fi

  build:
    name: Build Applications
    runs-on: ubuntu-latest
    needs: [lint, type-check]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install root dependencies
        run: npm ci

      - name: Install web dependencies
        working-directory: apps/web
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm i; fi

      - name: Build Next.js application
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images
        run: |
          if [ -f "infra/docker/Dockerfile" ] || [ -f "Dockerfile" ]; then
            docker build -t media-lab:latest .
            echo "Docker image built successfully"
          else
            echo "No Dockerfile found, skipping Docker build..."
          fi

  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install root dependencies
        run: npm ci

      - name: Install web dependencies
        working-directory: apps/web
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm i; fi

      - name: Run npm audit
        run: npm audit --audit-level moderate

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install Python dependencies
        working-directory: services/api
        run: |
          pip install -r requirements.txt
          pip install safety

      - name: Run Python security audit
        working-directory: services/api
        run: safety check
