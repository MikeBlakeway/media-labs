name: CI

on:
  push:
    branches: [main, development]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'public/**'
  pull_request:
    branches: [main, development]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node-test:
    name: Node.js Test & Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: node-test-results
          path: test-results/

  python-test:
    name: Python Test & Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('volume-worker/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install dependencies
        run: pip install -r volume-worker/requirements.txt
      - name: Lint
        run: make -C volume-worker lint
      - name: Test
        run: make -C volume-worker test
      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: python-test-results
          path: volume-worker/test-results/

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [node-test, python-test]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Deploy to Cloud
        run: ./scripts/deploy.sh
