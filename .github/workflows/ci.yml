name: CI Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Build and start services
      run: |
        docker compose up -d --build comfyui backend
        
    - name: Wait for services to be ready
      run: |
        echo "Waiting for backend to be ready..."
        timeout 120 bash -c 'until curl -f http://localhost:8000/health; do sleep 2; done'
        echo "Backend is ready"
        
        echo "Waiting for ComfyUI to be ready..."
        timeout 180 bash -c 'until curl -f http://localhost:8188/; do sleep 3; done'
        echo "ComfyUI is ready"
        
    - name: Run backend unit tests
      run: |
        docker compose exec -T backend sh -c "cd /app && pytest tests/ -v -m 'not smoke'"
        
    - name: Run smoke tests
      run: |
        docker compose exec -T backend sh -c "cd /app && BACKEND_URL=http://localhost:8000 pytest tests/ -v -m smoke"
        
    - name: Show service logs on failure
      if: failure()
      run: |
        echo "=== Backend logs ==="
        docker compose logs backend
        echo "=== ComfyUI logs ==="
        docker compose logs comfyui
        
    - name: Cleanup
      if: always()
      run: |
        docker compose down -v
