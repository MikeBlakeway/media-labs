name: Codacy analyze on PRs

on:
  pull_request:
    branches: [ main ]

jobs:
  codacy-analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Python linters
        run: |
          python -m pip install --upgrade pip
          pip install pylint bandit

      - name: Install Node linters
        run: |
          npm install -g markdownlint-cli@0.32.0 eslint@8
      - name: Install Codacy CLI
        run: |
          # Attempt to install codacy-cli via npm if available
          if npm view @codacy/codacy-coverage >/dev/null 2>&1; then
            npm install -g @codacy/codacy-cli || true
          else
            echo "Codacy CLI not found in npm registry; skipping global install"
          fi

      - name: Run markdownlint
        run: markdownlint -c .markdownlint.json "**/*.md"

      - name: Run pylint (backend)
        run: pylint backend || true

      - name: Run bandit (backend)
        run: bandit -r backend -c .bandit || true

      - name: Run eslint (frontend)
        run: |
          if [ -d frontend ]; then
            npx eslint "frontend/**/*.{js,jsx,ts,tsx}" --config .eslintrc.json || true
          else
            echo "No frontend directory; skipping eslint"
          fi

      - name: Attempt Codacy CLI analyze (if available)
        run: |
          if command -v codacy_cli_analyze >/dev/null 2>&1; then
            echo "Running codacy_cli_analyze for markdownlint"
            codacy_cli_analyze --rootPath . --tool markdownlint --file README.md || true
            echo "Running codacy_cli_analyze for pylint"
            codacy_cli_analyze --rootPath . --tool pylint --file backend/ || true
            echo "Running codacy_cli_analyze for bandit"
            codacy_cli_analyze --rootPath . --tool bandit --file backend/ || true
            echo "Running codacy_cli_analyze for eslint"
            codacy_cli_analyze --rootPath . --tool eslint --file frontend/ || true
            echo "Running codacy_cli_analyze for trivy"
            codacy_cli_analyze --rootPath . --tool trivy || true
          else
            echo "codacy_cli_analyze not available in runner; skipping Codacy CLI steps."
          fi
