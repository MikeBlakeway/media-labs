# .github/workflows/copilot-setup-steps.yml
# Runs BEFORE Copilot Coding Agent starts (one job named `copilot-setup-steps`).
# Docs: https://docs.github.com/copilot/how-tos/agents/copilot-coding-agent/customizing-the-development-environment-for-copilot-coding-agent

name: Copilot Setup Steps

permissions:
  contents: read
  deployments: write

on:
  workflow_dispatch: {}
  # Copilot triggers this implicitly; workflow_dispatch allows manual debugging

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        # If you want LFS blobs automatically, set: with: { lfs: true }
        # with:
        #   lfs: true

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          # Cache for the web app workspace (root may not have a lockfile yet)
          cache-dependency-path: |
            apps/web/package-lock.json

      - name: Install root dependencies (using lockfile)
        if: ${{ hashFiles('package-lock.json') != '' }}
        run: npm ci
        working-directory: .

      - name: Install root dependencies (no lockfile)
        if: ${{ hashFiles('package-lock.json') == '' }}
        run: npm i --no-audit --no-fund
        working-directory: .

      - name: Enable corepack (pnpm/npm/yarn)
        run: corepack enable || true

      - name: Install web dependencies (apps/web)
        working-directory: apps/web
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm i; fi

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            services/api/requirements.txt

      - name: Install API dependencies (services/api)
        if: ${{ hashFiles('services/api/requirements.txt') != '' }}
        working-directory: services/api
        run: pip install -r requirements.txt

      # Fallbacks if no requirements yet (useful early in the project)
      - name: Install minimal API deps (fallback)
        if: ${{ hashFiles('services/api/requirements.txt') == '' }}
        run: pip install fastapi uvicorn[standard] httpx pydantic

      - name: Install ffmpeg and git-lfs (media tooling)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg git-lfs
          # Install LFS filters globally, but DO NOT write repo hooks (Husky owns hooks).
          # Also skip smudge to avoid auto-downloading LFS blobs during setup.
          git lfs install --skip-repo --skip-smudge

      # If/when you actually need LFS objects during this run, uncomment:
      # - name: Fetch LFS content (when needed)
      #   run: git lfs pull

      # Optional: install Redis CLI for debugging queue connectivity later
      - name: Install redis-tools (optional)
        run: |
          sudo apt-get update
          sudo apt-get install -y redis-tools

      # Optional: cache Python torch wheels if added later (kept here as template)
      - name: Prepare Torch wheel cache (optional)
        if: false
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}

      - name: Git/Husky/LFS diagnostics
        run: |
          git --version
          git lfs version
          echo "hooksPath=$(git config --get core.hooksPath || echo .git/hooks)"
          test -f .husky/pre-push && echo "Husky pre-push present" || echo "No Husky pre-push hook"

      - name: Print environment summary
        run: |
          node -v
          npm -v
          python -V
          ffmpeg -version | head -n 1

      - name: Done
        run: echo "Copilot preinstall complete"
