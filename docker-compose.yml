version: '3.9'
services:
  web:
    build: ./apps/ui
    env_file: .env
    ports:
      - '3000:3000'
    depends_on:
      - api

  api:
    build: ./apps/api
    env_file: .env
    ports:
      - '4000:4000'
    volumes:
      - ./data:/app/data

  worker:
    build: ./apps/worker
    env_file: .env
    command: ['node', 'dist/index.js']
    depends_on:
      - api

  comfyui-video:
    build: ./pods/comfyui-video
    env_file: .env
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: ['gpu']
    runtime: nvidia
    shm_size: '16gb'
    volumes:
      - ./models:/models
      - ./cache:/root/.cache
    ports:
      - '8188:8188'

  fake-gpu:
    build: ./pods/fake-gpu
    env_file: .env
    ports:
      - '8190:3000'

networks:
  default:
    driver: bridge
