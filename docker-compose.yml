# CPU-only development environment
# This file orchestrates all Media Lab services for local development

services:
  # API orchestration service
  api:
    build:
      context: ./services/api
      dockerfile: ../../infra/docker/api.Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ENV=dev
      - API_BASE_URL=http://localhost:8000
      - ARTIFACTS_DIR=/app/storage/artifacts
      - URL_SIGNING_SECRET=dev-secret-change-me
    volumes:
      - ./storage/artifacts:/app/storage/artifacts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - media-lab

  # ComfyUI service (CPU mode)
  comfyui:
    build:
      context: .
      dockerfile: ./infra/docker/comfyui.Dockerfile
    ports:
      - "8188:8188"
    environment:
      - CUDA_VISIBLE_DEVICES=""  # Disable GPU for CPU mode
    volumes:
      - ./storage/models:/app/models
      - ./storage/artifacts:/app/outputs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8188/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - media-lab

  # Demucs audio separation service
  demucs:
    build:
      context: .
      dockerfile: ./infra/docker/demucs.Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - ./storage/artifacts:/app/outputs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - media-lab

networks:
  media-lab:
    driver: bridge

volumes:
  models:
    driver: local
  artifacts:
    driver: local